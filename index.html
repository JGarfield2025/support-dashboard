<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuraLinc Support Dashboard - Q1 2026</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --accent2: #a78bfa; --danger: #f87171; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  #login-screen { text-align: center; max-width: 400px; width: 100%; padding: 24px; }
  .lock-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
  #login-screen h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #login-screen p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .input-group { position: relative; margin-bottom: 16px; }
  #password-input {
    width: 100%; padding: 14px 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  #password-input:focus { border-color: var(--accent); }
  #password-input::placeholder { color: var(--muted); }
  #unlock-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px; color: #0f172a; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  #unlock-btn:hover { opacity: 0.9; }
  #unlock-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }
  .spinner { display: none; margin: 16px auto; width: 24px; height: 24px; border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div id="login-screen">

  <p>Q1 2026 Ticket Themes &middot; Password Required</p>
  <div class="input-group">
    <input type="password" id="password-input" placeholder="Enter password" autofocus>
  </div>
  <button id="unlock-btn" onclick="unlock()">Unlock Dashboard</button>
  <div class="spinner" id="spinner"></div>
  <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>
</div>

document.getElementById('password-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
  document.getElementById('error-msg').style.display = 'none';
});

async function unlock() {
  const pw = document.getElementById('password-input').value;
  if (!pw) return;

  const btn = document.getElementById('unlock-btn');
  const spinner = document.getElementById('spinner');
  const errorMsg = document.getElementById('error-msg');
  
  btn.disabled = true;
  spinner.style.display = 'block';
  errorMsg.style.display = 'none';

  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const ct = Uint8Array.from(atob(ENCRYPTED.ct), c => c.charCodeAt(0));

    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    const html = new TextDecoder().decode(decrypted);

    // Replace entire document
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    btn.disabled = false;
    spinner.style.display = 'none';
    errorMsg.style.display = 'block';
    document.getElementById('password-input').select();
  }
}
</script>
